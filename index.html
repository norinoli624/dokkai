<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ドッカイズ！</title>

 <style>
/* ===================================================
   1. アプリ全体のベース設定（色変わりバグ完全修正版）
   =================================================== */

body {
  margin: 0;
  padding: 0;
  /* 💡 解決のポイント：デフォルト色からは !important を外します */
  background-color: #FFF3E0; 
  /* 🚀 ふわっと色が変わるアニメーションを完全に有効化 */
  transition: background-color 0.5s ease !important; 
  font-family: 'Helvetica Neue', Arial, sans-serif;
  text-align: center;
}

/* 🚀 レベル別の背景色クラス：bodyにクラスがついた時だけ !important で最優先上書きします */
body.bg-level2 {
  background-color: #E8F5E9 !important; /* 3〜4年生：淡い黄緑 */
}

body.bg-level3 {
  background-color: #E3F2FD !important; /* 5〜6年生：淡い水色（青） */
}

/* 💡 画面の非表示設定（!important の優先度を最優先にして確実に隠す） */
.hidden {
  display: none !important;
}


/* ==========================================
   2. スタート画面（タイトル画面）のスタイル（修正版）
   ========================================== */
#start-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  text-align: center;
  padding: 20px;
  box-sizing: border-box;
}

/* スタート画面のロゴの外枠 */
#start-screen .title-logo {
  margin: 40px auto 5px auto; /* 確実に中央寄せ */
  width: 100%;
  max-width: 450px;
  padding: 0 20px;
  box-sizing: border-box;
  display: block;
}

/* ロゴ画像自体の設定 */
#start-screen #app-logo {
  width: 100%;
  height: auto;
  object-fit: contain;
  margin: 0 auto;
}

/* 「えらんでね！」の文字 */
#start-screen .subtitle {
  font-size: 1.3rem;
  font-weight: bold;
  color: #FF6F00;
  margin: 0 auto 30px auto; /* 確実に中央寄せ */
  display: block;
}

/* ボタンをまとめるメニュー外枠 */
.level-menu {
  display: flex;
  flex-direction: column;
  gap: 15px;
  width: 100%;
  max-width: 300px;
  margin: 0 auto; /* メニューの箱自体を画面の真ん中に配置 */
  padding: 0;
}

/* レベル選択ボタン（ガタつき防止 ＆ 中央維持版） */
.level-btn {
  display: flex;
  align-items: center;
  justify-content: flex-start; /* ボタンの中身（星と文字）は左ベースで並べる */
  padding: 15px 25px;
  border: none;
  border-radius: 50px;
  font-size: 1.2rem;
  font-weight: bold;
  color: #fff;
  cursor: pointer;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  transition: transform 0.2s, box-shadow 0.2s;
  width: 100%;
  box-sizing: border-box;
}

.level-btn:active {
  transform: scale(0.95);
}

/* ボタン個別の色 */
.lvl-1 { background-color: #FF9800; }
.lvl-2 { background-color: #4CAF50; }
.lvl-3 { background-color: #2196F3; }

/* 星のエリア（横幅を完全に固定して文字の位置を揃える） */
.stars {
  font-size: 1.1rem;
  width: 65px;         /* 星3つ分が余裕を持って収まる幅に完全固定 */
  text-align: left;    /* 星は左詰めで表示 */
  display: inline-block !important;
  flex-shrink: 0;      /* 画面が狭くなっても縮まないように固定 */
}

/* ボタンのテキスト */
.btn-text {
  text-align: left;    /* 文字の開始位置を左に揃える */
  padding-left: 10px;   /* 星との間の隙間 */
}


/* ===================================================
   3. クイズ画面のスタイル（新UI：横幅フル活用・中央画像＆文章3択）
   =================================================== */
#quiz-screen {
  width: 100vw;
  max-width: 100%;
  min-height: 100vh;
  margin: 0;
  padding: 10px 24px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  overflow-y: auto;
  
  /* 🚀【重要修正】ベタ塗りのグレー(#f7f9fc)を完全に消去して「透明」にします！
     これでbodyの優しいパステルカラーが画面の最前面まで美しく突き抜けます */
  background-color: transparent !important;
}

/* 「だい1もん / ぜん5もん」のバッジ */
.progress-text {
  display: inline-block;
  font-size: 18px;
  font-weight: bold;
  color: #fff;
  background-color: #ff9800;
  padding: 6px 20px;
  border-radius: 20px;
  margin: 0 auto 6px auto;
  box-shadow: 0 4px 0 #e65100;
  text-align: center;
}

/* ===================================================
   ① 問題文（h1）の修正：横長画面での間延びを防ぎ、スリムに中央寄せ
   =================================================== */
h1 {
  font-size: 22px;            /* 子どもが読みやすい最適なサイズを維持 */
  line-height: 1.5;
  color: #2e7d32;
  background: white;
  border: 3px solid #a5d6a7;
  border-radius: 16px;
  padding: 12px 20px;
  width: 95%;
  max-width: 960px;           /* 横幅を最大960pxに制限し、横に広がりすぎるのを完全に防ぎます */
  margin: 0 auto 10px auto;   /* 画面中央に寄せつつ、下の余白をキープ */
  box-sizing: border-box;
  box-shadow: 0 4px 0 #c8e6c9;
  text-align: left;
  white-space: pre-wrap;      /* JSONの改行 (\n) をブラウザ上で100%確実に反映させる */
}

/* ===================================================
   画像コンテナの修正：PC大画面でも巨大化させず、40%以内にロック
   =================================================== */
/* 16:9正解画像専用の中央配置コンテナ */
.main-image-container {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
  flex-grow: 1;
  /* 縦幅の上限を 「40vh (画面の40%)」に制限し、PCでの巨大化を完全に防ぎます */
  height: 40vh !important;
  max-height: 40vh !important;
  margin: 0 auto 10px auto;
}
.main-image-container img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;        /* 16:9を維持 */
  border: 4px solid #ffcc80;
  border-radius: 20px;
  box-shadow: 0 6px 0 #ffe0b2;
  background-color: #fff;
  display: block;
}



/* ==========================================================
   ⚡ 空間最大有効活用仕様：タブレット横向き用・完全隔離グリッドパッチ（画像しっかり下げ版）
   ========================================================== */
@media (orientation: landscape) {
  
  /* クイズ画面がアクティブ（表示中）の時だけ適用 */
  #quiz-screen:not(.hidden) {
    display: grid !important;
    /* 左右の比率を「文章：55%」「画像：45%」に美しく分割 */
    grid-template-columns: 55% 45% !important;
    /* 高さを完全に自動（auto）にすることで、長文問題でも文字をすべて露出させスクロールを消去 */
    grid-template-rows: auto auto auto !important;
    row-gap: 8px !important;
    column-gap: 16px !important;
    min-height: 100dvh !important;
    height: auto !important;
    max-height: none !important;
    padding: 10px 16px 20px 16px !important;
    box-sizing: border-box !important;
    overflow-y: auto !important; /* 画面全体で自然に収めるセーフティ */
  }

  /* クイズ画面内のロゴは非表示を維持 */
  #quiz-screen:not(.hidden) img[alt="ドッカイズ! ロゴ"] {
    display: none !important;
  }

  /* 「だい●問」のオレンジ帯 */
  #quiz-screen:not(.hidden) .progress-text {
    grid-column: 1 / 2 !important;
    grid-row: 1 / 2 !important;
    font-size: 13px !important;
    margin: 0 !important;
    display: inline-block !important;
    justify-self: start !important; 
    width: auto !important;
    padding: 4px 12px !important;
  }

  /* 上の問題文：高さを「auto（自動）」にし、枠内スクロールを完全に消滅させます */
  #quiz-screen:not(.hidden) h1 {
    grid-column: 1 / 2 !important;
    grid-row: 2 / 3 !important;
    font-size: 15px !important;
    line-height: 1.45 !important;
    padding: 10px 14px !important;
    width: 100% !important;
    max-width: none !important;
    height: auto !important;        /* 文字をすべて出し切るためautoに */
    max-height: none !important;
    margin: 0 !important;
    box-sizing: border-box !important;
    overflow: visible !important;   /* 枠内スクロールを完全撤廃 */
  }

  /* 外枠（content-wrapper）の透明化を維持 */
  #quiz-screen:not(.hidden) .content-wrapper {
    display: contents !important;
  }

  /* 正解画像エリア：文章の高さに合わせて、右側で綺麗に並ぶ自動伸縮構造 */
  #quiz-screen:not(.hidden) .main-image-container {
    grid-column: 2 / 3 !important;
    grid-row: 2 / 3 !important;
    width: 100% !important;
    height: 100% !important;        /* 左側の問題文の高さと同期 */
    min-height: 180px !important;   /* 画像が縮みすぎないための保険 */
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
    box-sizing: border-box !important;
    align-self: start !important;   /* 上端を基準線にする */
    /* 💡【最終調整】画像の大きさはそのまま、さらにしっかり下に「40px」下げて、問題文と上下中央のバランスを取ります */
    margin: 40px 0 0 0 !important;  
  }
  #quiz-screen:not(.hidden) .main-image-container img {
    width: auto !important;
    height: auto !important;
    max-width: 100% !important;
    max-height: 300px !important;   /* 子どもたちが見やすい大きな300pxサイズを維持 */
    object-fit: contain !important;
    border: 3px solid #ffcc80 !important;
    border-radius: 12px !important;
    box-shadow: 0 4px 0 #ffe0b2 !important;
    margin: 0 !important;
  }

  /* 選択肢カード：下段（3段目） */
  #quiz-screen:not(.hidden) .quiz-container {
    grid-column: 1 / 3 !important;
    grid-row: 3 / 4 !important;
    display: grid !important;
    grid-template-columns: repeat(3, 1fr) !important;
    width: 100% !important;
    height: auto !important;        /* カードの文字量にジャストフィット */
    gap: 12px !important;
    margin: 4px 0 0 0 !important;
    box-sizing: border-box !important;
  }

  /* 3択カードの内部レイアウト */
  #quiz-screen:not(.hidden) .image-card {
    padding: 10px 14px !important;
    height: auto !important;        /* 無駄な高さをカットして中身にフィット */
    min-height: 110px !important;   /* 最低限の押しやすさは死守 */
    box-sizing: border-box !important;
    display: flex !important;
    flex-direction: column !important;
    justify-content: space-between !important;
    overflow: hidden !important;
  }
  
  /* カード内の文章 */
  #quiz-screen:not(.hidden) .card-text {
    font-size: 15px !important;
    line-height: 1.4 !important;
    overflow: hidden !important;
    margin-bottom: 4px !important;
  }

  /* せんたくしラベルの微調整 */
  #quiz-screen:not(.hidden) .image-card .label {
    margin-top: 2px !important;
    font-size: 11px !important;
    text-align: right !important;
    border-top: 1px solid #f0f0f0 !important;
    padding-top: 2px !important;
  }
}




/* ===================================================
   ② ラジカくん（#result-box）の修正：
   選択肢に絶対に被らない「画面中央の特大ポップアップ（モーダル）」仕様
   =================================================== */
#result-box {
  position: fixed !important;
  top: 50% !important;     /* 🚀 画面の縦中央 */
  left: 50% !important;    /* 🚀 画面の横中央 */
  transform: translate(-50%, -50%) !important; /* 完全に画面の真ん中にロック */
  background-color: rgba(255, 255, 255, 0.98) !important; /* 背景を真っ白にして後ろの文字を隠す */
  border: 6px solid #ff9800 !important;
  border-radius: 24px !important;
  padding: 24px 40px !important;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3) !important; /* 浮き出るような影 */
  z-index: 99999 !important; /* 3択カードや画像よりも絶対に手前に表示 */
  display: none;           /* 最初は非表示 */
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-width: 350px !important;
}

/* ポップアップ内のラジカくんイラストのサイズ */
#result-box img {
  width: 140px !important; /* しっかり目立つサイズに拡大 */
  height: auto !important;
  margin-bottom: 12px;
}

/* ポップアップ内の「せいかい！」「ざんねん！」の文字 */
#result-box .result-text {
  font-size: 28px !important;
  font-weight: bold !important;
  color: #e65100 !important;
  margin-bottom: 16px;
  text-align: center;
}

/* ===================================================
   ポップアップ内専用：子どもが押しやすい巨大ボタンのスタイル
   =================================================== */
.modal-buttons {
  width: 100%;
  display: flex;
  justify-content: center;
  margin-top: 16px;
}

.action-btn {
  font-size: 22px !important;
  font-weight: bold !important;
  color: white !important;
  padding: 12px 32px !important;
  border-radius: 50px !important;
  border: none !important;
  cursor: pointer !important;
  box-shadow: 0 6px 0 rgba(0,0,0,0.2) !important;
  transition: transform 0.1s !important;
  width: 85%;
  max-width: 280px;
}
.action-btn:active {
  transform: translateY(4px) !important;
  box-shadow: none !important;
}

/* 「もういちど考える」は注意を促すオレンジ色 */
.retry-layout {
  background-color: #ff9800 !important;
}
/* 「次の問題へ」はワクワクする黄緑色 */
.next-layout {
  background-color: #4caf50 !important;
}


/* 3枚の文章選択肢カードを並べるエリア（画面いっぱいに3列等倍） */
.quiz-container {
  display: grid !important; /* 強制的にグリッド化 */
  grid-template-columns: repeat(3, 1fr) !important; /* 🚀 古い横幅制限を無視し、3つ等倍で横いっぱいに広げる */
  flex-direction: unset !important; /* 古いflex設定を解除 */
  justify-content: unset !important;
  gap: 20px;            /* カード同士の隙間 */
  width: 100% !important;
  max-width: 100% !important; /* 制限を完全解除 */
  height: 26vh !important; /* height: 28vh !important; */    /* 縦幅を28%に固定し、文字が溢れないようにする */
  max-height: 30vh !important;
  margin: 0 auto 4px auto;
  padding: 0;
  box-sizing: border-box;
  overflow: hidden !important; /* 外側のハミ出しを完全にカット */
}

/* 文章選択肢のカード（画像なし・純粋なステップ表示用リッチボタン） */
.image-card {
  background: white;
  border: 4px solid #ffcc80;
  border-radius: 20px;
  padding: 16px;
  box-shadow: 0 6px 0 #ffe0b2;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s, border-color 0.1s;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  box-sizing: border-box;
  width: 100% !important;   /* グリッド幅いっぱいに広げる */
  max-width: 100% !important; /* 古い320px制限を完全破壊 */
  height: 100% !important;   /* 縦幅をコンテナに合わせる */
}

/* 【重要】カード内の指示文章テキスト（文字が綺麗に収まるように微調整） */
.card-text {
  font-size: 21px;            /* ★16pxから21pxへ拡大！上の問題文とほぼ同等に見やすく調整 */
  text-align: left;
  line-height: 1.5;           /* ★1.4から1.5へ広げ、文字の重なりを防止 */
  color: #2c3e50;
  font-weight: bold;
  word-break: break-all;
  overflow-y: auto;           /* 万が一文字が多くてもカード内でスクロールを許可するセーフティ */
}

/* カード内の古い画像を非表示にする（新UIでは使用しないため） */
.image-card img {
  display: none !important;
}

/* カード下部の「せんたくし1」などのラベル */
.label {
  margin-top: auto;
  padding-top: 4px;
  font-size: 15px;
  font-weight: bold;
  color: #e65100;
  text-align: center;
  border-top: 1px dashed #ffe0b2; /* 区切り線をつけて見やすく */
}

/* タップ時のリアルな押し込みフィードバック */
.image-card:active {
  transform: translateY(4px);
  box-shadow: 0 2px 0 #ffe0b2;
  border-color: #ffb74d;
}

/* --- 正解・不正解アニメーション --- */
.image-card.correct-anim {
  animation: bounce 0.5s ease-in-out;
  border-color: #4caf50 !important;
  box-shadow: 0 6px 0 #c8e6c9 !important;
}
.image-card.wrong-anim {
  animation: shake 0.4s ease-in-out;
  border-color: #f44336 !important;
  box-shadow: 0 6px 0 #ffcdd2 !important;
}



@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-10px); }
  40%, 80% { transform: translateX(10px); }
}

@keyframes shakeX {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-10px); }
  40%, 80% { transform: translateX(10px); }
}

/* クイズコンテナ全体のスライドイン（次移行時） */
.slide-in {
  animation: slideInFromRight 0.4s ease-out;
}

@keyframes slideInFromRight {
  from {
    opacity: 0;
    transform: translateX(50px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}


/* カードの下の「せんたくし1」などの文字 */
.label {
  margin-top: 12px;
  font-size: 22px;
  font-weight: bold;
  color: #e65100;
  text-align: center;
}

/* ○×判定のメッセージボックス */
.result-message {
  min-height: 80px;
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 20px;
  padding: 10px;
  border-radius: 15px;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
  box-sizing: border-box;
}

.result-correct {
  color: #2e7d32;
  background-color: #e8f5e9;
  border: 2px solid #a5d6a7;
}

.result-wrong {
  color: #c62828;
  background-color: #ffebee;
  border: 2px solid #ffcdd2;
}

/* つぎの問題へボタン */
.next-btn {
  display: none;
  background-color: #4caf50;
  color: white;
  font-size: 24px;
  font-weight: bold;
  border: none;
  padding: 15px 50px;
  border-radius: 40px;
  cursor: pointer;
  box-shadow: 0 6px 0 #2e7d32;
  transition: all 0.1s;
  margin: 20px auto 0 auto !important; /* 確実に真ん中に配置 */
}

.next-btn:hover {
  background-color: #43a047;
  transform: translateY(2px);
  box-shadow: 0 4px 0 #2e7d32;
}

/* 次の問題が右から入ってくるアニメーション */
.slide-in {
  animation: slideInLeft 0.4s ease-out forwards;
}

@keyframes slideInLeft {
  0% {
    transform: translateX(100px);
    opacity: 0;
  }
  100% {
    transform: translateX(0);
    opacity: 1;
  }
}


/* ===================================================
   4. キャラクター「ラジカくん」の設定（新UI・被り絶対撲滅版）
   =================================================== */

/* 🚀 1. 問題を解いている最中（初期状態）は、画面からラジカくんを完全に消し去ります */
.radika-standalone-container,
.radika-container,
.radika-talk-box,
#radika-avatar,
.radika-standalone-img,
.radika-img {
  display: none !important;
}

/* 🚀 2. ただし【中央ポップアップ（#result-box）の中】にあるラジカくんだけは、
      答えを押した時に美しく表示されるようにロックを解除し、優しく揺らします */
#result-box #radika-avatar {
  display: block !important;
  width: 120px !important;   /* 子どもに見やすい程よいサイズ */
  height: auto !important;
  margin: 0 auto 12px auto !important; /* 中央寄せ＆下の隙間 */
  object-fit: contain;
  animation: radika-popup-float 2s ease-in-out infinite alternate !important;
}

/* ポップアップ内限定の優しい浮遊アニメーション */
@keyframes radika-popup-float {
  0% { transform: translateY(0); }
  100% { transform: translateY(-6px); }
}

/* 💡 古い吹き出しパーツは使用しないためすべて非表示 */
.speech-bubble {
  display: none !important;
}

.speech-bubble::before {
  content: "";
  position: absolute;
  left: -16px;
  top: 50%;
  transform: translateY(-50%);
  border-style: solid;
  border-width: 10px 16px 10px 0;
  border-color: transparent #ffcc80 transparent transparent;
}
.speech-bubble::after {
  content: "";
  position: absolute;
  left: -10px;
  top: 50%;
  transform: translateY(-50%);
  border-style: solid;
  border-width: 8px 12px 8px 0;
  border-color: transparent #ffffff transparent transparent;
}
.speech-bubble p {
  margin: 0;
  color: #5d4037;
  font-size: 16px;
  font-weight: bold;
  line-height: 1.5;
}

/* ==========================================
   5. クリアモーダル（ポップアップ）と星のエフェクト
   ========================================== */
.clear-modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.4);
  z-index: 9999;
  justify-content: center;
  align-items: center;
}

.clear-content {
  background: white;
  border: 6px solid #ffb74d;
  border-radius: 32px;
  padding: 30px;
  text-align: center;
  box-shadow: 0 12px 0 #ffe0b2, 0 20px 30px rgba(0,0,0,0.2);
  width: 80%;
  max-width: 450px;
  box-sizing: border-box;
  animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

@keyframes popUp {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

.clear-icon {
  font-size: 64px;
  animation: pulse 1s infinite alternate;
}

@keyframes pulse {
  0% { transform: scale(1); }
  100% { transform: scale(1.1); }
}

.clear-content h2 {
  color: #ff9800;
  font-size: 28px;
  margin: 15px 0 10px;
}

.clear-content p {
  color: #5d4037;
  font-size: 18px;
  font-weight: bold;
  line-height: 1.6;
  margin-bottom: 20px;
}

/* 「もういちどあそぶ」ボタン */
#restart-button {
  background: #4caf50;
  color: white;
  border: none;
  border-radius: 20px;
  padding: 12px 30px;
  font-size: 18px;
  font-weight: bold;
  box-shadow: 0 6px 0 #388e3c;
  cursor: pointer;
  transition: transform 0.1s;
}

#restart-button:active {
  transform: translateY(4px);
  box-shadow: 0 2px 0 #388e3c;
}

/* 降ってくる星のスタイル */
.clear-star {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 999999; /* 絶対に一番手前に表示されるように超巨大な数値にする */
  animation: fallAndFade 2s ease-in forwards; 
}

@keyframes fallAndFade {
  0% {
    transform: translateY(-50px) rotate(0deg) scale(0);
    opacity: 0;
  }
  15% {
    opacity: 1;
    transform: translateY(50px) rotate(50deg) scale(1.3);
  }
  100% {
    transform: translateY(105vh) rotate(360deg) scale(0.7);
    opacity: 0;
  }
}
  </style>
</head>

<body>

  <!-- 🛠️ テスト用 問題セレクトメニュー（最上部固定） -->
  <div id="debug-menu" style="background: #ffffff; padding: 10px 16px; border-radius: 12px; margin: 10px auto; max-width: 960px; border: 3px dashed #007bff; text-align: left; box-sizing: border-box; font-family: sans-serif; position: relative; z-index: 999999;">
      <strong style="color: #007bff; font-size: 15px;">🛠️ テスト用 問題セレクト:</strong>
      <select id="debug-question-select" onchange="selectTestQuestion(this.value)" style="padding: 6px; font-size: 14px; border-radius: 6px; border: 2px solid #007bff; margin-left: 10px; cursor: pointer; max-width: 70%;">
          <option value="">-- 問題を選んでテスト（またはスタート画面へ） --</option>
      </select>
  </div>


  <!-- スタート画面（修正版） -->
  <div id="start-screen">
    <!-- タイトルをテキストからロゴ画像に変更 -->
    <h1 class="title-logo">
      <img src="logo.png" alt="ドッカイズ！" id="app-logo">
    </h1>
  
    <p class="subtitle">えらんでね！</p>
  
    <div class="level-menu">
      <button class="level-btn lvl-1" onclick="startQuiz('1')">
        <span class="stars">⭐</span>
        <span class="btn-text">1・2ねんせい</span>
      </button>
      <button class="level-btn lvl-2" onclick="startQuiz('2')">
        <span class="stars">⭐⭐</span>
        <span class="btn-text">3・4ねんせい</span>
      </button>
      <button class="level-btn lvl-3" onclick="startQuiz('3')">
        <span class="stars">⭐⭐⭐</span>
        <span class="btn-text">5・6ねんせい</span>
      </button>
    </div>
  </div>

  <!-- クイズ画面(初期状態は hidden で隠しておく) -->
  <div id="quiz-screen" class="hidden">
    <div style="margin-top: 10px; margin-bottom: 10px;">
        <img src="logo.png" alt="ドッカイズ! ロゴ" style="max-width: 300px; width: 100%; height: auto;">
    </div>
    <div id="progress" class="progress-text">データをよみこみ中... </div>
    <h1 id="question-text">読み込み中... </h1>

    <!-- ★ここに content-wrapper を移動（問題文の下から囲むことで、スタート画面での露出を100%防ぎます） -->
    <div class="content-wrapper">
        <!-- ※JavaScriptによって、ここに「.main-image-container」と「#quiz-container」が自動挿入されます -->
        <div id="quiz-container" class="quiz-container"></div>
    </div>

    <!--大改善: ボタンをすべて内包した中央ポップアップエリア -->
    <div id="result-box" class="result-message" style="display: none;">
        <!-- ラジカくんのイラストやメッセージがここに入ります -->
        <div id="result-content"></div>
        
        <!-- ポップアップ専用の操作ボタンエリア -->
        <div class="modal-buttons">
            <button id="retry-button" class="action-btn retry-layout" style="display: none;" onclick="closeModal()">もういちど 考える</button>
            <button id="next-button" class="action-btn next-layout" style="display: none;" onclick="nextQuestion()">つぎの もんだいへ ➔</button>
        </div>
    </div>

    <div>
      <button id="next-button" class="next-btn" onclick="nextQuestion()">つぎの問題へ ➔</button>
    </div>

    <!-- 💡 ラジカくんの画像だけを表示するシンプルな枠組みに書き換えます -->
    <div class="radika-standalone-container">
      <img id="radika-avatar" class="radika-standalone-img" src="radika.png" alt="ラジカくん">
    </div>

  </div>


  <script>
(function() {
    // 💡 1. 好きなパスワード（合言葉）に書き換えてください
    const CORRECT_PASSWORD = "dockize2026"; 

    // 💡 2. すでに認証済みかチェック（ブラウザのタブを閉じるまで有効）
    if (sessionStorage.getItem("quiz_authenticated") === "true") {
        // 認証済みなら、HTMLにある「hidden」クラスを取り除いて画面を表示
        const screen = document.getElementById("quiz-screen");
        if (screen) screen.classList.remove("hidden");
        return;
    }

    // 💡 3. 画面を開いた瞬間にパスワード入力を求める
    let userPassword = prompt("【ドッカイズ！】テスト運用画面です。\n関係者向けのパスワードを入力してください。");

    // 💡 4. パスワードの判定
    if (userPassword === CORRECT_PASSWORD) {
        alert("認証に成功しました！クイズを開始します。");
        // 認証成功をブラウザに記憶させる
        sessionStorage.setItem("quiz_authenticated", "true");
        // クイズ画面の非表示（hidden）を解除して表示する
        const screen = document.getElementById("quiz-screen");
        if (screen) screen.classList.remove("hidden");
    } else {
        alert("パスワードが違います。アクセスできません。");
        // パスワードが違う場合は、画面を真っ白にして完全にブロックする
        document.body.innerHTML = "<h1 style='text-align:center; margin-top:20%; font-family:sans-serif;'>🔒 アクセス権限がありません。</h1>";
    }
})();





    /**
     * 🛠️ JSONデータからデバッグメニューの選択肢を自動生成する関数（20問目以降・レベル別カウント付き）
     */
    function createDebugMenu() {
        const selectEl = document.getElementById("debug-question-select");
        if (!selectEl || !allQuizData || allQuizData.length === 0) return;

        // 💡 1. 各レベルの問題数をカウントする変数を準備（20問目以降のみを対象）
        let countLvl1 = 0;
        let countLvl2 = 0;
        let countLvl3 = 0;

        allQuizData.forEach(q => {
            if (parseInt(q.id) < 20) return; // 1〜19問目は集計から除外
            const lvl = String(q.level || "1");
            if (lvl === "1") countLvl1++;
            if (lvl === "2") countLvl2++;
            if (lvl === "3") countLvl3++;
        });

        // 💡 2. メニューの先頭（タイトル）に現在の問題数をリアルタイム表示
        selectEl.innerHTML = `
            <option value="">-- 問題を選んでテスト（またはスタート画面へ） --</option>
            <option value="" disabled style="font-weight: bold; color: #333;">
                📊 現在の問題数 ➔ 【レベル1】: ${countLvl1}問 / 【レベル2】: ${countLvl2}問 / 【レベル3】: ${countLvl3}問
            </option>
            <option value="" disabled>--------------------------------------------------</option>
        `;

        // ID順に並び替え
        const sortedQuestions = [...allQuizData].sort((a, b) => parseInt(a.id) - parseInt(b.id));

        // 💡 3. 選択肢をドロップダウンに追加
        sortedQuestions.forEach(q => {
            if (parseInt(q.id) < 20) return; // 1〜19問目はスキップ

            const option = document.createElement("option");
            option.value = q.id;
            const previewText = q.questionText ? q.questionText.replace(/[\n◆【】]/g, "").substring(0, 15) : "";
            option.textContent = `ID: ${q.id} (レベル${q.level || "1"}) - ${previewText}...`;
            selectEl.appendChild(option);
        });
    }
    
    /**
     * 🛠️ ドロップダウンで選んだ問題を強制ロードしてクイズ画面を起動する関数
     */
    function selectTestQuestion(questionId) {
        if (!questionId) {
            alert("スタート画面に戻ります。");
            location.reload();
            return;
        }

        const targetQuiz = allQuizData.find(q => q.id === parseInt(questionId));

        if (targetQuiz) {
            console.log("🛠️ デバッグ：問題ID [" + questionId + "] を強制表示します。", targetQuiz);
            
            currentPlayQuestions = [targetQuiz];
            currentQuestionIndex = 0;

            // 画面表示の確実な切り替え
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');

            loadQuestion();

            const resultBox = document.getElementById("result-box");
            if (resultBox) resultBox.style.display = "none";
        } else {
            alert("指定された問題ID: " + questionId + " がデータ内に見つかりません。");
        }
    }






    // 🌟 設定：1回のゲームで何問出題するか
    const QUESTIONS_PER_GAME = 5;

    let allQuizData = [];           // すべてのデータが入る配列
    let currentPlayQuestions = [];  // 今回プレイする問題が入る配列
    let currentQuestionIndex = 0;   // 現在の問題の番号
    // 💡 現在選択されている問題のヒント情報を保持する変数
    let currentHints = { hint1: "", hint2: "" }; 

    // レベルを選択してクイズを開始する関数
    function startQuiz(selectedLevel) {
        document.body.style.transition = 'background-color 0.5s ease';
        if (selectedLevel === '2') {
            document.body.style.setProperty('background-color', '#E8F5E9', 'important');
        } else if (selectedLevel === '3') {
            document.body.style.setProperty('background-color', '#E3F2FD', 'important');
        } else {
            document.body.style.setProperty('background-color', '#FFF3E0', 'important');
        }

        // 登録問題をフィルター
        let levelFilteredQuestions = allQuizData.filter(quiz => {
            const lvl = quiz.level || '1';
            const quizId = quiz.id;
            return lvl === selectedLevel && quizId >= 21;
        });

        if (levelFilteredQuestions.length === 0) {
            alert('まだこのレベルの問題が登録されていないよ！これからどんどん追加しよう！');
            return;
        }

        // シャッフル処理
        for (let i = levelFilteredQuestions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [levelFilteredQuestions[i], levelFilteredQuestions[j]] = [levelFilteredQuestions[j], levelFilteredQuestions[i]];
        }

        // 【仕様適合】QUESTIONS_PER_GAME（5問）の定数を用いて正確に切り出し
        currentPlayQuestions = levelFilteredQuestions.slice(0, QUESTIONS_PER_GAME);

        // 💡 画面表示の確実な切り替え
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').classList.remove('hidden');
        currentQuestionIndex = 0;
        loadQuestion();
    }

  async function initApp() {
      try {
          // 1. 元々の quiz.json を読み込む
          const response = await fetch('quiz.json');
          if (!response.ok) throw new Error('JSONファイルの読み込みに失敗しました');
          const jsonQuestions = await response.json();

          // 2. LocalStorage の追加問題を読み込む
          const localQuestionsData = localStorage.getItem('dockais_added_questions');
          const localQuestions = localQuestionsData ? JSON.parse(localQuestionsData) : [];

          // 3. スプレッド演算子「...」でフラットに合体してバグを解消
          allQuizData = [...jsonQuestions, ...localQuestions];

          console.log('データの読み込みが完了しました! 問題数:', allQuizData.length);
          
          // 🛠️ データが揃ったので、メニューの選択肢をここで起動
          createDebugMenu();

      } catch (error) {
          console.error(error);
          document.getElementById('question-text').innerText = 'エラー: もんだいデータが よみこめませんでした。';
      }
      // 💡【追加】初期化の最後に、クイズ画面を確実に隠してスタート画面だけを残す！
      document.getElementById('quiz-screen').classList.add('hidden'); 
  }



    // 💡 setupGame関数は役割をstartQuizに統合したため、中身を空にするか削除して大丈夫です
    function setupGame() {
      // 互換性のために残す場合は空欄にします
    }


    // 💡 全体の問題データを保持するグローバル変数（既存の変数名に合わせてください）
    let allQuestionsData = []; 

    /**
    * 🛠️ 選択した特定のコードの問題を強制的に表示する関数
    */
    function selectTestQuestion(questionId) {
        if (!questionId) {
            alert("スタート画面に戻ります。");
            location.reload();
            return;
        }

        const targetQuiz = allQuizData.find(q => q.id === parseInt(questionId));

        if (targetQuiz) {
            console.log("🛠️ デバッグ：問題ID [" + questionId + "] を強制表示します。", targetQuiz);
            
            currentPlayQuestions = [targetQuiz];
            currentQuestionIndex = 0;

            // 💡 画面表示の確実な切り替え（CSSの干渉を防ぐためdisplayとclassListの両方を制御）
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-screen').classList.remove('hidden');

            loadQuestion();

            const resultBox = document.getElementById("result-box");
            if (resultBox) resultBox.style.display = "none";
        } else {
            alert("指定された問題ID: " + questionId + " がデータ内に見つかりません。");
        }
    }


    // 💡 txtファイルの読み込み（fetch）がなくなり、一瞬で画面が切り替わる安全な関数に進化しました
    function loadQuestion() {
        if (currentPlayQuestions.length == 0) return;
        const currentQuiz = currentPlayQuestions[currentQuestionIndex];
        
        // 1. ヘッダー情報のセット
        document.getElementById('progress').innerText = `だい ${currentQuestionIndex + 1} もん / ぜん ${currentPlayQuestions.length} もん`;
        
        // 2. 問題文指示テキストの表示
        document.getElementById('question-text').innerText = currentQuiz.questionText;
        
        // 3. 不正解時のヒントの記録
        currentHints.hint1 = currentQuiz.hint1 || "よくよんでみよう！";
        currentHints.hint2 = currentQuiz.hint2 || "もういちどチャレンジ！";
        
        // 4. UI表示状態のリセット
        document.getElementById('next-button').style.display = 'none';
        const resultBox = document.getElementById('result-box');
        resultBox.style.display = 'none';
        resultBox.className = 'result-message';
        
        // 5. メイン画像エリアの構築（古い画像コンテナがあれば削除して新設）
        let existingImgContainer = document.querySelector('.main-image-container');
        if (existingImgContainer) {
            existingImgContainer.remove();
        }
        
        if (currentQuiz.questionImage) {
            const mainImgContainer = document.createElement('div');
            mainImgContainer.className = 'main-image-container';
            mainImgContainer.innerHTML = `<img src="${currentQuiz.questionImage}" alt="もんだいのえ">`;
            
            // 問題文（#question-text）のすぐ後ろに画像を挿入
            const qText = document.getElementById('question-text');
            qText.parentNode.insertBefore(mainImgContainer, qText.nextSibling);
        }
        
        // 6. 選択肢コンテナのクリア
        const container = document.getElementById('quiz-container');
        container.innerHTML = '';
        
        // 7. 選択肢配列の安全な取得
        let choices = [];
        if (Array.isArray(currentQuiz.choices)) {
            choices = [...currentQuiz.choices];
        } else if (currentQuiz.choices && typeof currentQuiz.choices === 'object') {
            choices = [
                { text: currentQuiz.choices.correct, isCorrect: true, type: 'correct' },
                { text: currentQuiz.choices.wrong1, isCorrect: false, type: 'hint1' },
                { text: currentQuiz.choices.wrong2, isCorrect: false, type: 'hint2' }
            ];
        }
        
        // 8. 選択肢のシャッフル
        const shuffledChoices = [...choices];
        for (let i = shuffledChoices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffledChoices[i], shuffledChoices[j]] = [shuffledChoices[j], shuffledChoices[i]];
        }
        
        // 9. テキスト選択肢カードの生成と配置
        shuffledChoices.forEach((choice, index) => {
            const card = document.createElement('div');
            card.className = 'image-card';
            card.onclick = function () { checkAnswer(choice, this); };
            
            // 改行コード（\n）をHTMLの改行に自動変換
            const formattedText = choice.text.replace(/\n/g, '<br>');
            
            card.innerHTML = `
                <div class="card-text">${formattedText}</div>
                <div class="label">せんたくし ${index + 1}</div>
            `;
            container.appendChild(card);
        });
    }




    const correctSound = new Audio('correct.mp3');
    const wrongSound = new Audio('wrong.mp3');
    const fanfareSound = new Audio('fanfare.mp3');

    // 🚀 大改善：音声・アバター処理を維持したまま、ボタン内包＆閉じる機能を追加
    function checkAnswer(choice, cardElement) {
      if (cardElement.classList.contains('correct-anim') || cardElement.classList.contains('wrong-anim')) {
        return;
      }

      const resultBox = document.getElementById('result-box');
      const radikaAvatar = document.getElementById('radika-avatar'); 
      const retryButton = document.getElementById('retry-button');
      const nextButton = document.getElementById('next-button');

      // 最初にボタンの表示状況をリセット
      if (retryButton) retryButton.style.display = 'none';
      if (nextButton) nextButton.style.display = 'none';

      if (radikaAvatar) {
        radikaAvatar.classList.remove('radika-happy', 'radika-shock');
      }

      if (choice.isCorrect) {
        // 【正解のときの処理】
        cardElement.classList.add('correct-anim');

        if (radikaAvatar) {
          radikaAvatar.src = 'radika_correct.png';
          radikaAvatar.classList.add('radika-happy');
        }

        // 🔊 音声を再生
        correctSound.currentTime = 0;
        correctSound.play();

        resultBox.className = 'result-message result-correct';
        
        // 💡 骨組みの中身を構築（アバター画像エリアの下にテキストと次の問題ボタンを配置）
        resultBox.innerHTML = `
            <div class="result-text" style="color: #4caf50 !important; font-size: 26px; font-weight: bold; margin-bottom: 10px;">🎉 せいかい！よくよめたね！</div>
            <img id="radika-avatar" src="radika_correct.png" class="radika-happy" style="width: 130px; height: auto; margin-bottom: 12px;">
            <div class="modal-buttons">
                <button id="next-button" class="action-btn next-layout" onclick="nextQuestion()">つぎの もんだいへ ➔</button>
            </div>
        `;
      } else {
        // 【不正解のときの処理】
        cardElement.classList.add('wrong-anim');

        if (radikaAvatar) {
          radikaAvatar.src = 'radika_wrong.png';
          radikaAvatar.classList.add('radika-shock');
        }

        // 🔊 音声を再生
        wrongSound.currentTime = 0;
        wrongSound.play();

        resultBox.className = 'result-message result-wrong';
    
        // 選択肢のタイプに合わせて、記録していたヒントを取得
        const targetHint = choice.type === 'hint1' ? currentHints.hint1 : currentHints.hint2;
        
        // 💡 骨組みの中身を構築（ヒントを表示し、もう一度考えるボタンを配置）
        resultBox.innerHTML = `
            <div class="result-text" style="color: #f44336 !important; font-size: 24px; font-weight: bold; margin-bottom: 10px;">❌ ざんねん！もういちどよくよんでみよう！</div>
            <img id="radika-avatar" src="radika_wrong.png" class="radika-shock" style="width: 110px; height: auto; margin-bottom: 12px;">
            <p style="font-size: 16px; font-weight: bold; color: #555; margin: 6px 0; padding: 0 15px; line-height: 1.4;">${targetHint}</p>
            <div class="modal-buttons">
                <button id="retry-button" class="action-btn retry-layout" onclick="closeModal()">もういちど 考える</button>
            </div>
        `;

        // 震えるアニメーションの自動解除（元のコードのロジックを維持）
        setTimeout(() => {
          cardElement.classList.remove('wrong-anim');
        }, 400);
      }

      // 画面中央のポップアップとして表示
      resultBox.style.display = 'flex';
    }

    // 🚀 不正解ダイアログを一瞬で閉じるための新しい関数（checkAnswerの下に追記してください）
    function closeModal() {
      document.getElementById('result-box').style.display = 'none';
    }

    function nextQuestion() {      
      currentQuestionIndex++;
      const radikaAvatar = document.getElementById('radika-avatar');

      if (radikaAvatar) {
        radikaAvatar.classList.remove('radika-happy', 'radika-shock');
      }

      if (currentQuestionIndex < currentPlayQuestions.length) {
        loadQuestion();
        
        // 💡 安全装置：triggerSlideAnimation が定義されていない場合でもエラーで止まらないようにする
        if (typeof triggerSlideAnimation === 'function') {
          triggerSlideAnimation();
        } else {
          // 関数がない場合は、クイズコンテナに直接アニメーションクラスを付与する
          const container = document.getElementById('quiz-container');
          if (container) {
            container.classList.remove('slide-in');
            void container.offsetWidth; // 画面を強制再描画させてアニメーションをリセット
            container.classList.add('slide-in');
          }
        }
        
        if (radikaAvatar) radikaAvatar.src = 'radika.png';
      } else {
        // 🚀 【大改善】全問クリア画面が出る瞬間に、手前で邪魔をしていた正解ダイアログを強制的に消し去る！
        const resultBox = document.getElementById('result-box');
        if (resultBox) {
          resultBox.style.display = 'none';
        }

        const clearModal = document.getElementById('clear-modal');
        if (clearModal) {
          clearModal.style.display = 'flex';
        }
        
        try {
          if (radikaAvatar) radikaAvatar.src = 'radika_complete.png';
        } catch(e) { console.error(e); }
        
        try {
          if (typeof fanfareSound !== 'undefined' && fanfareSound) {
            fanfareSound.currentTime = 0;
            fanfareSound.play();
          }
        } catch(e) { console.error(e); }
        
        startStarShower();
      }
    }


    let starInterval; 
    function startStarShower() {
      if (starInterval) clearInterval(starInterval);
      
      starInterval = setInterval(() => {
        try {
          const star = document.createElement('div');
          star.className = 'clear-star';
          
          const emojis = ['⭐', '✨', '🎉', '🌟'];
          star.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
          
          star.style.position = 'fixed';
          star.style.top = '0';
          star.style.left = Math.random() * 100 + 'vw';        
          star.style.fontSize = (Math.random() * 24 + 16) + 'px'; 
          star.style.pointerEvents = 'none';
          star.style.zIndex = '999999';
          star.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';
          
          document.body.appendChild(star);
          
          setTimeout(() => { star.remove(); }, 3000);
        } catch(e) {
          clearInterval(starInterval);
        }
      }, 80); 
    }

    function closeClearModal() {
      // 1. クリアモーダル（ポップアップ）を閉じる
      const clearModal = document.getElementById('clear-modal');
      if (clearModal) {
        clearModal.style.display = 'none';
      }
      
      // 2. 画面に残っているキラキラの星エフェクトを完全に消去する
      if (starInterval) clearInterval(starInterval);
      const remainingStars = document.querySelectorAll('.clear-star');
      remainingStars.forEach(star => star.remove());
      
      // 3. ファンファーレ音楽を止める
      try {
        if (typeof fanfareSound !== 'undefined' && fanfareSound) {
          fanfareSound.pause();
          fanfareSound.currentTime = 0; // 音を最初に戻す
        }
      } catch(e) { console.error(e); }
      
      // 4. ラジカくんの画像とアニメーションを元通り（通常時）にリセットする
      const radikaAvatar = document.getElementById('radika-avatar');
      if (radikaAvatar) {
        radikaAvatar.src = 'radika.png';
        radikaAvatar.className = 'radika-standalone-img'; // 通常のふわふわアニメーションに戻す
      }

      // 5. 💡【新UI安全装置】クイズ画面を完全に隠して、最初の「スタート画面」を一瞬で表示する
      const quizScreen = document.getElementById('quiz-screen');
      const startScreen = document.getElementById('start-screen');
      
      if (quizScreen && startScreen) {
        // classListとstyle.displayの両方に対応させ、100%確実に画面を切り替えます
        quizScreen.classList.add('hidden');
        quizScreen.style.display = 'none';
        
        startScreen.classList.remove('hidden');
        startScreen.style.display = 'flex'; // または 'block' (スタート画面のCSSに合わせる)
      }
      
      // 6. 🚀【超安全対策】CSSの優先順位を無視し、ボディの背景色を元の淡いオレンジ（スタート画面の色）へ強制リセット！
      document.body.style.setProperty('background-color', '#FFF3E0', 'important');
      document.body.classList.remove('bg-level2', 'bg-level3');

      // 7. 最新のデータ状態を読み込み直して、次のプレイの選択を待つ
      initApp();
    }




    function triggerSlideAnimation() {
      const container = document.getElementById('quiz-container');
      container.classList.remove('slide-in');
      void container.offsetWidth; 
      container.classList.add('slide-in');
    }

        // 💡 先生が貼り付けたJSONデータをブラウザに保存する関数
    function addCustomQuestion() {
      const inputTextArea = document.getElementById('admin-json-input');
      const jsonText = inputTextArea.value.trim();
      
      if (!jsonText) {
        alert('JSONデータが入力されていません！');
        return;
      }
      
      try {
        // 貼り付けられたテキストが正しいJSON形式かチェック
        const newQuestion = JSON.parse(jsonText);
        
        // 最低限必要な情報（idや問題文）が入っているか確認
        if (!newQuestion.id || !newQuestion.questionText) {
          alert('問題データの形式が正しくないようです。「id」や「questionText」が含まれているか確認してください。');
          return;
        }
        
        // すでに保存されている追加分のリストを取得
        const localQuestionsData = localStorage.getItem('dockais_added_questions');
        let localQuestions = localQuestionsData ? JSON.parse(localQuestionsData) : [];
        
        // 同じIDの問題がすでに登録されていないか重複チェック
        const isDuplicate = localQuestions.some(q => q.id === newQuestion.id);
        if (isDuplicate) {
          if (!confirm(`すでに問題ID「${newQuestion.id}」は追加されています。上書きしますか？`)) {
            return;
          }
          // 重複している古い問題を一度削除
          localQuestions = localQuestions.filter(q => q.id !== newQuestion.id);
        }
        
        // 新しい問題をリストに加えて保存
        localQuestions.push(newQuestion);
        localStorage.setItem('dockais_added_questions', JSON.stringify(localQuestions));
        
        alert(`🎉 問題ID「q${newQuestion.id}」をアプリに追加しました！\nフォルダ「q${newQuestion.id}」の中にイラスト画像が入っていることを確認してください。`);
        
        // フォームを空にして画面を再起動し、新しい問題を出題対象に含める
        inputTextArea.value = '';
        initApp();
        
      } catch (error) {
        console.error(error);
        alert('❌ エラー：JSONの形式が正しくありません。ChatGPTが出力したコードブロックをそっくりそのままコピーできているか確認してください。');
      }
    }

    // 💡 追加した問題をすべてリセットして最初の11問に戻す関数
    function resetCustomQuestions() {
      if (confirm('これまで追加した問題をすべて削除し、最初の11問だけの状態に戻しますか？')) {
        localStorage.removeItem('dockais_added_questions');
        alert('追加した問題をリセットしました。');
        initApp();
      }
    }

    // 💡 追記：管理画面のパスワードチェック関数
    function checkAdminPassword() {
      // 🌟 ここに好きなパスワードを設定してください（現在は 'radika-admin' になっています）
      const CORRECT_PASSWORD = 'radika-admin'; 
      
      const inputPassword = document.getElementById('admin-password').value;
      const adminMainForm = document.getElementById('admin-main-form');
      const authBox = document.getElementById('admin-auth-box');

      if (inputPassword === CORRECT_PASSWORD) {
        alert('🔓 パスワードが合っていました！管理画面を開きます。');
        adminMainForm.style.display = 'block'; // 本体のフォームを表示
        authBox.style.display = 'none';         // パスワード入力欄を隠す
      } else {
        alert('❌ パスワードが違います。もう一度入力してください。');
        document.getElementById('admin-password').value = ''; // 入力欄をクリア
      }
    }

        // 💡 追記：追加した問題をJSONファイルとしてパソコンに保存（ダウンロード）する関数
    function exportQuestionsToFile() {
      // LocalStorageから追加問題データを取得
      const localQuestionsData = localStorage.getItem('dockais_added_questions');
      
      if (!localQuestionsData || JSON.parse(localQuestionsData).length === 0) {
        alert('まだ新しく追加された問題がありません。データを保存するには問題を1問以上追加してください。');
        return;
      }

      // JSONデータを綺麗に整形してテキスト化
      const jsonText = JSON.stringify(JSON.parse(localQuestionsData), null, 2);
      
      // ブラウザにダウンロードさせるための仕組み（Blobオブジェクト）を作成
      const blob = new Blob([jsonText], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      
      // 一時的なリンクを作って自動的にクリック（ダウンロード実行）
      const a = document.createElement('a');
      a.href = url;
      a.download = 'dockais_backup_questions.json'; // ダウンロードされるファイル名
      document.body.appendChild(a);
      a.click();
      
      // 後片付け
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // 💡 追記：パソコンに保存したJSONファイルを読み込んでLocalStorageを復元する関数
    function importQuestionsFromFile(inputElement) {
      const file = inputElement.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const importedData = JSON.parse(e.target.result);
          
          // 読み込んだデータが正しい配列の形式かチェック
          if (!Array.isArray(importedData)) {
            alert('❌ エラー：ファイルのデータ形式が正しくありません。');
            return;
          }

          if (!confirm(`保存ファイルから ${importedData.length} 問の問題を復元しますか？\n（※現在アプリに追加されているカスタム問題は上書きされます）`)) {
            inputElement.value = ''; // ファイル選択をクリア
            return;
          }

          // LocalStorageに保存してアプリを再起動
          localStorage.setItem('dockais_added_questions', JSON.stringify(importedData));
          alert('🎉 バックアップから問題を無事に復元しました！');
          
          inputElement.value = ''; // ファイル選択をクリア
          initApp(); // スタート画面に戻して再読み込み
          
        } catch (error) {
          console.error(error);
          alert('❌ エラー：ファイルの読み込みに失敗しました。正しいJSONファイルか確認してください。');
          inputElement.value = '';
        }
      };
      
      reader.readAsText(file);
    }
    
    window.onload = initApp;
  </script>
