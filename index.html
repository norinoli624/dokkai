<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ドッカイズ！</title>

 <style>
/* ===================================================
   1. アプリ全体のベース設定（色変わりバグ完全修正版）
   =================================================== */

body {
  margin: 0;
  padding: 0;
  /* 💡 解決のポイント：デフォルト色からは !important を外します */
  background-color: #FFF3E0; 
  /* 🚀 ふわっと色が変わるアニメーションを完全に有効化 */
  transition: background-color 0.5s ease !important; 
  font-family: 'Helvetica Neue', Arial, sans-serif;
  text-align: center;
}

/* 🚀 レベル別の背景色クラス：bodyにクラスがついた時だけ !important で最優先上書きします */
body.bg-level2 {
  background-color: #E8F5E9 !important; /* 3〜4年生：淡い黄緑 */
}

body.bg-level3 {
  background-color: #E3F2FD !important; /* 5〜6年生：淡い水色（青） */
}

/* 💡 画面の非表示設定（!important の優先度を最優先にして確実に隠す） */
.hidden {
  display: none !important;
}


/* ==========================================
   2. スタート画面（タイトル画面）のスタイル（修正版）
   ========================================== */
#start-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  text-align: center;
  padding: 20px;
  box-sizing: border-box;
}

/* スタート画面のロゴの外枠 */
#start-screen .title-logo {
  margin: 40px auto 5px auto; /* 確実に中央寄せ */
  width: 100%;
  max-width: 450px;
  padding: 0 20px;
  box-sizing: border-box;
  display: block;
}

/* ロゴ画像自体の設定 */
#start-screen #app-logo {
  width: 100%;
  height: auto;
  object-fit: contain;
  margin: 0 auto;
}

/* 「えらんでね！」の文字 */
#start-screen .subtitle {
  font-size: 1.3rem;
  font-weight: bold;
  color: #FF6F00;
  margin: 0 auto 30px auto; /* 確実に中央寄せ */
  display: block;
}

/* ボタンをまとめるメニュー外枠 */
.level-menu {
  display: flex;
  flex-direction: column;
  gap: 15px;
  width: 100%;
  max-width: 300px;
  margin: 0 auto; /* メニューの箱自体を画面の真ん中に配置 */
  padding: 0;
}

/* レベル選択ボタン（ガタつき防止 ＆ 中央維持版） */
.level-btn {
  display: flex;
  align-items: center;
  justify-content: flex-start; /* ボタンの中身（星と文字）は左ベースで並べる */
  padding: 15px 25px;
  border: none;
  border-radius: 50px;
  font-size: 1.2rem;
  font-weight: bold;
  color: #fff;
  cursor: pointer;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  transition: transform 0.2s, box-shadow 0.2s;
  width: 100%;
  box-sizing: border-box;
}

.level-btn:active {
  transform: scale(0.95);
}

/* ボタン個別の色 */
.lvl-1 { background-color: #FF9800; }
.lvl-2 { background-color: #4CAF50; }
.lvl-3 { background-color: #2196F3; }

/* 星のエリア（横幅を完全に固定して文字の位置を揃える） */
.stars {
  font-size: 1.1rem;
  width: 65px;         /* 星3つ分が余裕を持って収まる幅に完全固定 */
  text-align: left;    /* 星は左詰めで表示 */
  display: inline-block !important;
  flex-shrink: 0;      /* 画面が狭くなっても縮まないように固定 */
}

/* ボタンのテキスト */
.btn-text {
  text-align: left;    /* 文字の開始位置を左に揃える */
  padding-left: 10px;   /* 星との間の隙間 */
}


/* ===================================================
   3. クイズ画面のスタイル（新UI：横幅フル活用・中央画像＆文章3択）
   =================================================== */
#quiz-screen {
  width: 100vw;
  max-width: 100%;
  min-height: 100vh;
  margin: 0;
  padding: 10px 24px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  overflow-y: auto;
  
  /* 🚀【重要修正】ベタ塗りのグレー(#f7f9fc)を完全に消去して「透明」にします！
     これでbodyの優しいパステルカラーが画面の最前面まで美しく突き抜けます */
  background-color: transparent !important;
}

/* 「だい1もん / ぜん5もん」のバッジ */
        .progress-text {
            display: inline-block;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            background-color: #ff9800;
            padding: 6px 14px;
            border-radius: 50px;
            box-shadow: 0 3px 0 #e65100;
            text-align: center;
            flex-shrink: 0;
            margin: 0 !important;
            position: static !important;
            transform: none !important;
        }

/* ===================================================
   ① 問題文（h1）の修正：横長画面での間延びを防ぎ、スリムに中央寄せ
   =================================================== */
h1 {
  font-size: 22px;            /* 子どもが読みやすい最適なサイズを維持 */
  line-height: 1.5;
  color: #2e7d32;
  background: white;
  border: 3px solid #a5d6a7;
  border-radius: 16px;
  padding: 12px 20px;
  width: 95%;
  max-width: 960px;           /* 横幅を最大960pxに制限し、横に広がりすぎるのを完全に防ぎます */
  margin: 0 auto 10px auto;   /* 画面中央に寄せつつ、下の余白をキープ */
  box-sizing: border-box;
  box-shadow: 0 4px 0 #c8e6c9;
  text-align: left;
  white-space: pre-wrap;      /* JSONの改行 (\n) をブラウザ上で100%確実に反映させる */
}

/* ===================================================
   画像コンテナの修正：PC大画面でも巨大化させず、40%以内にロック
   =================================================== */
/* 16:9正解画像専用の中央配置コンテナ */
.main-image-container {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
  flex-grow: 1;
  /* 縦幅の上限を 「40vh (画面の40%)」に制限し、PCでの巨大化を完全に防ぎます */
  height: 40vh !important;
  max-height: 40vh !important;
  margin: 0 auto 10px auto;
}
.main-image-container img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;        /* 16:9を維持 */
  border: 4px solid #ffcc80;
  border-radius: 20px;
  box-shadow: 0 6px 0 #ffe0b2;
  background-color: #fff;
  display: block;
}



/* ==========================================================
   ⚡ 空間最大有効活用仕様：タブレット横向き用・完全隔離グリッドパッチ（画像しっかり下げ版）
   ========================================================== */
@media (orientation: landscape) {
  
  /* クイズ画面がアクティブ（表示中）の時だけ適用 */
  #quiz-screen:not(.hidden) {
    display: grid !important;
    /* 左右の比率を「文章：55%」「画像：45%」に美しく分割 */
    grid-template-columns: 55% 45% !important;
    /* 高さを完全に自動（auto）にすることで、長文問題でも文字をすべて露出させスクロールを消去 */
    grid-template-rows: auto auto auto !important;
    row-gap: 8px !important;
    column-gap: 16px !important;
    min-height: 100dvh !important;
    height: auto !important;
    max-height: none !important;
    padding: 10px 16px 20px 16px !important;
    box-sizing: border-box !important;
    overflow-y: auto !important; /* 画面全体で自然に収めるセーフティ */
  }

  /* クイズ画面内のロゴは非表示を維持 */
  #quiz-screen:not(.hidden) img[alt="ドッカイズ! ロゴ"] {
    display: none !important;
  }

  /* 「だい●問」のオレンジ帯 */
  #quiz-screen:not(.hidden) .progress-text {
    grid-column: 1 / 2 !important;
    grid-row: 1 / 2 !important;
    font-size: 13px !important;
    margin: 0 !important;
    display: inline-block !important;
    justify-self: start !important; 
    width: auto !important;
    padding: 4px 12px !important;
  }

        /* 🛠️ 問題文を元の安全な2段目（メーターのすぐ下）に完全に引き戻します */
        #quiz-screen:not(.hidden) h1 {
            grid-column: 1 / 2 !important;
            grid-row: 2 / 3 !important;    /* ⚠️ 3/4 から元の 2/3 に戻して完全復活させます */
            font-size: 15px !important;
            line-height: 1.45 !important;
            padding: 10px 14px !important;
            width: 100% !important;
            max-width: none !important;
            height: auto !important;
            max-height: none !important;
            margin: 0 !important;
            box-sizing: border-box !important;
            overflow: visible !important;
        }

  /* 外枠（content-wrapper）の透明化を維持 */
  #quiz-screen:not(.hidden) .content-wrapper {
    display: contents !important;
  }

  /* 正解画像エリア：文章の高さに合わせて、右側で綺麗に並ぶ自動伸縮構造 */
  #quiz-screen:not(.hidden) .main-image-container {
    grid-column: 2/3 !important;
    grid-row: 2/3 !important;
    width: 100% !important;
    height: 100% !important;
    min-height: 180px !important;
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
    box-sizing: border-box !important;
    align-self: start !important;
    margin: 10px 0 0 0 !important; 
    
    /* 🛠️ 修正：画像の大きさに合わせて、外枠の器も「300px」にピッタリ同期させます */
    max-height: 300px !important; 
  }

  #quiz-screen:not(.hidden) .main-image-container img {
    width: auto !important;
    height: auto !important;
    max-width: 100% !important;
    
    /* ⭕ ご希望の、子どもたちが見やすい大きな300pxサイズを100%完全に維持します */
    max-height: 300px !important;   
    
    object-fit: contain !important;
    border: 3px solid #ffcc80 !important;
    border-radius: 12px !important;
    box-shadow: 0 4px 0 #ffe0b2 !important;
    margin: 0 !important;
  }

  /* 選択肢カード：下段（3段目） */
  #quiz-screen:not(.hidden) .quiz-container {
    grid-column: 1 / 3 !important;
    grid-row: 3 / 4 !important;
    display: grid !important;
    grid-template-columns: repeat(3, 1fr) !important;
    width: 100% !important;
    height: auto !important;        /* カードの文字量にジャストフィット */
    gap: 12px !important;
    margin: 4px 0 0 0 !important;
    box-sizing: border-box !important;
  }

  /* 3択カードの内部レイアウト */
  #quiz-screen:not(.hidden) .image-card {
    padding: 10px 14px !important;
    height: auto !important;        /* 無駄な高さをカットして中身にフィット */
    min-height: 110px !important;   /* 最低限の押しやすさは死守 */
    box-sizing: border-box !important;
    display: flex !important;
    flex-direction: column !important;
    justify-content: space-between !important;
    overflow: hidden !important;
  }
  
  /* カード内の文章 */
  #quiz-screen:not(.hidden) .card-text {
    font-size: 15px !important;
    line-height: 1.4 !important;
    overflow: hidden !important;
    margin-bottom: 4px !important;
  }

  /* せんたくしラベルの微調整 */
  #quiz-screen:not(.hidden) .image-card .label {
    margin-top: 2px !important;
    font-size: 11px !important;
    text-align: right !important;
    border-top: 1px solid #f0f0f0 !important;
    padding-top: 2px !important;
  }
}




/* ===================================================
   ② ラジカくん（#result-box）の修正：
   選択肢に絶対に被らない「画面中央の特大ポップアップ（モーダル）」仕様
   =================================================== */
#result-box {
  position: fixed !important;
  top: 50% !important;     /* 🚀 画面の縦中央 */
  left: 50% !important;    /* 🚀 画面の横中央 */
  transform: translate(-50%, -50%) !important; /* 完全に画面の真ん中にロック */
  background-color: rgba(255, 255, 255, 0.98) !important; /* 背景を真っ白にして後ろの文字を隠す */
  border: 6px solid #ff9800 !important;
  border-radius: 24px !important;
  padding: 24px 40px !important;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3) !important; /* 浮き出るような影 */
  z-index: 99999 !important; /* 3択カードや画像よりも絶対に手前に表示 */
  display: none;           /* 最初は非表示 */
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-width: 350px !important;
}

/* ポップアップ内のラジカくんイラストのサイズ */
#result-box img {
  width: 140px !important; /* しっかり目立つサイズに拡大 */
  height: auto !important;
  margin-bottom: 12px;
}

/* ポップアップ内の「せいかい！」「ざんねん！」の文字 */
#result-box .result-text {
  font-size: 28px !important;
  font-weight: bold !important;
  color: #e65100 !important;
  margin-bottom: 16px;
  text-align: center;
}

/* ===================================================
   ポップアップ内専用：子どもが押しやすい巨大ボタンのスタイル
   =================================================== */
.modal-buttons {
  width: 100%;
  display: flex;
  justify-content: center;
  margin-top: 16px;
}

.action-btn {
  font-size: 22px !important;
  font-weight: bold !important;
  color: white !important;
  padding: 12px 32px !important;
  border-radius: 50px !important;
  border: none !important;
  cursor: pointer !important;
  box-shadow: 0 6px 0 rgba(0,0,0,0.2) !important;
  transition: transform 0.1s !important;
  width: 85%;
  max-width: 280px;
}
.action-btn:active {
  transform: translateY(4px) !important;
  box-shadow: none !important;
}

/* 「もういちど考える」は注意を促すオレンジ色 */
.retry-layout {
  background-color: #ff9800 !important;
}
/* 「次の問題へ」はワクワクする黄緑色 */
.next-layout {
  background-color: #4caf50 !important;
}


/* 3枚の文章選択肢カードを並べるエリア（画面いっぱいに3列等倍） */
.quiz-container {
  display: grid !important; /* 強制的にグリッド化 */
  grid-template-columns: repeat(3, 1fr) !important; /* 🚀 古い横幅制限を無視し、3つ等倍で横いっぱいに広げる */
  flex-direction: unset !important; /* 古いflex設定を解除 */
  justify-content: unset !important;
  gap: 20px;            /* カード同士の隙間 */
  width: 100% !important;
  max-width: 100% !important; /* 制限を完全解除 */
  height: 26vh !important; /* height: 28vh !important; */    /* 縦幅を28%に固定し、文字が溢れないようにする */
  max-height: 30vh !important;
  margin: 0 auto 4px auto;
  padding: 0;
  box-sizing: border-box;
  overflow: hidden !important; /* 外側のハミ出しを完全にカット */
}

/* 文章選択肢のカード（画像なし・純粋なステップ表示用リッチボタン） */
.image-card {
  background: white;
  border: 4px solid #ffcc80;
  border-radius: 20px;
  padding: 16px;
  box-shadow: 0 6px 0 #ffe0b2;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s, border-color 0.1s;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  box-sizing: border-box;
  width: 100% !important;   /* グリッド幅いっぱいに広げる */
  max-width: 100% !important; /* 古い320px制限を完全破壊 */
  height: 100% !important;   /* 縦幅をコンテナに合わせる */
}

/* 【重要】カード内の指示文章テキスト（文字が綺麗に収まるように微調整） */
.card-text {
  font-size: 21px;            /* ★16pxから21pxへ拡大！上の問題文とほぼ同等に見やすく調整 */
  text-align: left;
  line-height: 1.5;           /* ★1.4から1.5へ広げ、文字の重なりを防止 */
  color: #2c3e50;
  font-weight: bold;
  word-break: break-all;
  overflow-y: auto;           /* 万が一文字が多くてもカード内でスクロールを許可するセーフティ */
}

/* カード内の古い画像を非表示にする（新UIでは使用しないため） */
.image-card img {
  display: none !important;
}

/* カード下部の「せんたくし1」などのラベル */
.label {
  margin-top: auto;
  padding-top: 4px;
  font-size: 15px;
  font-weight: bold;
  color: #e65100;
  text-align: center;
  border-top: 1px dashed #ffe0b2; /* 区切り線をつけて見やすく */
}

/* タップ時のリアルな押し込みフィードバック */
.image-card:active {
  transform: translateY(4px);
  box-shadow: 0 2px 0 #ffe0b2;
  border-color: #ffb74d;
}

/* --- 正解・不正解アニメーション --- */
.image-card.correct-anim {
  animation: bounce 0.5s ease-in-out;
  border-color: #4caf50 !important;
  box-shadow: 0 6px 0 #c8e6c9 !important;
}
.image-card.wrong-anim {
  animation: shake 0.4s ease-in-out;
  border-color: #f44336 !important;
  box-shadow: 0 6px 0 #ffcdd2 !important;
}



@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-10px); }
  40%, 80% { transform: translateX(10px); }
}

@keyframes shakeX {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-10px); }
  40%, 80% { transform: translateX(10px); }
}

/* クイズコンテナ全体のスライドイン（次移行時） */
.slide-in {
  animation: slideInFromRight 0.4s ease-out;
}

@keyframes slideInFromRight {
  from {
    opacity: 0;
    transform: translateX(50px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}


/* カードの下の「せんたくし1」などの文字 */
.label {
  margin-top: 12px;
  font-size: 22px;
  font-weight: bold;
  color: #e65100;
  text-align: center;
}

/* ○×判定のメッセージボックス */
.result-message {
  min-height: 80px;
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 20px;
  padding: 10px;
  border-radius: 15px;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
  box-sizing: border-box;
}

.result-correct {
  color: #2e7d32;
  background-color: #e8f5e9;
  border: 2px solid #a5d6a7;
}

.result-wrong {
  color: #c62828;
  background-color: #ffebee;
  border: 2px solid #ffcdd2;
}

/* つぎの問題へボタン */
.next-btn {
  display: none;
  background-color: #4caf50;
  color: white;
  font-size: 24px;
  font-weight: bold;
  border: none;
  padding: 15px 50px;
  border-radius: 40px;
  cursor: pointer;
  box-shadow: 0 6px 0 #2e7d32;
  transition: all 0.1s;
  margin: 20px auto 0 auto !important; /* 確実に真ん中に配置 */
}

.next-btn:hover {
  background-color: #43a047;
  transform: translateY(2px);
  box-shadow: 0 4px 0 #2e7d32;
}

/* 次の問題が右から入ってくるアニメーション */
.slide-in {
  animation: slideInLeft 0.4s ease-out forwards;
}

@keyframes slideInLeft {
  0% {
    transform: translateX(100px);
    opacity: 0;
  }
  100% {
    transform: translateX(0);
    opacity: 1;
  }
}


/* ===================================================
   4. キャラクター「ラジカくん」の設定（新UI・被り絶対撲滅版）
   =================================================== */

/* 🚀 1. 問題を解いている最中（初期状態）は、画面からラジカくんを完全に消し去ります */
.radika-standalone-container,
.radika-container,
.radika-talk-box,
#radika-avatar,
.radika-standalone-img,
.radika-img {
  display: none !important;
}

/* 🚀 2. ただし【中央ポップアップ（#result-box）の中】にあるラジカくんだけは、
      答えを押した時に美しく表示されるようにロックを解除し、優しく揺らします */
#result-box #radika-avatar {
  display: block !important;
  width: 120px !important;   /* 子どもに見やすい程よいサイズ */
  height: auto !important;
  margin: 0 auto 12px auto !important; /* 中央寄せ＆下の隙間 */
  object-fit: contain;
  animation: radika-popup-float 2s ease-in-out infinite alternate !important;
}

/* ポップアップ内限定の優しい浮遊アニメーション */
@keyframes radika-popup-float {
  0% { transform: translateY(0); }
  100% { transform: translateY(-6px); }
}

/* 💡 古い吹き出しパーツは使用しないためすべて非表示 */
.speech-bubble {
  display: none !important;
}

.speech-bubble::before {
  content: "";
  position: absolute;
  left: -16px;
  top: 50%;
  transform: translateY(-50%);
  border-style: solid;
  border-width: 10px 16px 10px 0;
  border-color: transparent #ffcc80 transparent transparent;
}
.speech-bubble::after {
  content: "";
  position: absolute;
  left: -10px;
  top: 50%;
  transform: translateY(-50%);
  border-style: solid;
  border-width: 8px 12px 8px 0;

/* ==========================================

   ========================================== */
.clear-modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.4);
  z-index: 9999;
  justify-content: center;
  align-items: center;
}

.clear-content {
  background: white;
  border: 6px solid #ffb74d;
  border-radius: 32px;
  padding: 30px;
  text-align: center;
  box-shadow: 0 12px 0 #ffe0b2, 0 20px 30px rgba(0,0,0,0.2);
  width: 80%;
  max-width: 450px;
  box-sizing: border-box;
  animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

@keyframes popUp {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

.clear-icon {
  font-size: 64px;
  animation: pulse 1s infinite alternate;
}

@keyframes pulse {
  0% { transform: scale(1); }
  100% { transform: scale(1.1); }
}

.clear-content h2 {
  color: #ff9800;
  font-size: 28px;
  margin: 15px 0 10px;
}

.clear-content p {
  color: #5d4037;
  font-size: 18px;
  font-weight: bold;
  line-height: 1.6;
  margin-bottom: 20px;
}

/* 「もういちどあそぶ」ボタン */
#restart-button {
  background: #4caf50;
  color: white;
  border: none;
  border-radius: 20px;
  padding: 12px 30px;
  font-size: 18px;
  font-weight: bold;
  box-shadow: 0 6px 0 #388e3c;
  cursor: pointer;
  transition: transform 0.1s;
}

#restart-button:active {

}

/* 降ってくる星のスタイル */
.clear-star {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 999999; /* 絶対に一番手前に表示されるように超巨大な数値にする */
  animation: fallAndFade 2s ease-in forwards; 
}

@keyframes fallAndFade {
  0% {
    transform: translateY(-50px) rotate(0deg) scale(0);
    opacity: 0;
  }
  15% {
    opacity: 1;
    transform: translateY(50px) rotate(50deg) scale(1.3);
  }
  100% {
    transform: translateY(105vh) rotate(360deg) scale(0.7);

  }

    function createDebugMenu() {

        // 💡 1. 各レベルの問題数をカウントする変数を準備（20問目以降のみを対象）
        let countLvl1 = 0;

    // 💡 新機能：見出しの◆マークを検知して強制切断し、接続詞の細切れを100%防ぐ関数（完全版）
    function renderInteractiveQuestion(text) {
        const questionTextEl = document.getElementById('question-text');
        if (!questionTextEl) return;

        // 1. 文章を必ず「。や、や\nの【直後】」で区切る
        const rawSegments = text.match(/[^。、\n]+[。、\n]?|\n/g) || [text];
        
        const finalChunks = [];
        let currentBuffer = "";
        const MIN_CHAR_LENGTH = 15; // 💡 読点（、）の後の細切れを防ぐための最低文字数

				// 2. 句点(。)や見出し記号 (◆) を検知して、適切な長さで美しく結合・切断する
				for (let i = 0; i < rawSegments.length; i++) {
					const segment = rawSegments[i];
					
					// 独立した改行マーク (\n) がきた場合
					if (segment === '\n') {
						if (currentBuffer.trim() !== "") {
							finalChunks.push(currentBuffer);
						}
						finalChunks.push('\n');
						currentBuffer = "";
						continue;
					}
					
					currentBuffer += segment;
					
					// 解決の核心①: もしバッファの中に見出しの「◆」が含まれていたら、文字数に関係なく100%ここで強制切断!
					if (currentBuffer.includes('◆')) {
						if (currentBuffer.trim() !== "") {
							finalChunks.push(currentBuffer);
						}
						currentBuffer = "";
						continue;
					}
					
					// 【大改造・バグ撃退】末尾が「。」「」」であるか、途中に改行を含んでいたら1文として100%ここで確定して切り出す!
					if (segment.endsWith('。') || segment.endsWith('」') || segment.includes('\n')) {
						if (currentBuffer.trim() !== "") {
							finalChunks.push(currentBuffer.replace(/\n/g, ""));
						}
						if (segment.includes('\n')) {
							finalChunks.push('\n');
						}
						currentBuffer = "";
						continue;
					}
					
					// 末尾が「、」 (読点) だった場合は、短すぎる接続詞 (このあと、等)を防ぐため15文字判定を行う
					if (segment.endsWith('、')) {
						const cleanLength = currentBuffer.replace(/[\n、。]/g,"").length;
						if (cleanLength >= MIN_CHAR_LENGTH) {
							finalChunks.push(currentBuffer);
							currentBuffer = "";
						}
					}
				}
        
        // 最後に残ったバッファをすべて安全に回収
        if (currentBuffer.trim() !== "") {
            finalChunks.push(currentBuffer);
        }

        // 3. 構築された完璧なチャンク配列を画面に流し込む
        questionTextEl.innerHTML = "";
        
        finalChunks.forEach((chunkText) => {
            if (chunkText === '\n') {
                questionTextEl.appendChild(document.createElement('br'));
                return;
            }

            const span = document.createElement('span');
            span.className = 'reading-chunk';
            span.innerText = chunkText; 

            // 💡 指でタッチしたときのイベント処理
            span.onclick = function(e) {
                e.stopPropagation();
                
                document.querySelectorAll('.reading-chunk').forEach(el => {
                    el.classList.remove('active-chunk');
                });
                this.classList.add('active-chunk');
            };

            questionTextEl.appendChild(span);
        });
    }


    // 💡 txtファイルの読み込み（fetch）がなくなり、一瞬で画面が切り替わる安全な関数に進化しました（画像回り込みバグ完全修正版）
    /**
     * 問題データの読み込み表示（得点リセット連動・完全版）
     */
    function loadQuestion() {
        if (currentPlayQuestions.length == 0) return;
        const currentQuiz = currentPlayQuestions[currentQuestionIndex];
        
        // ★得点用：新しい問題になったので挑戦ミス回数を0リセット
        currentQuestionAttempts = 0;
        
        document.getElementById('progress').innerText = `だい ${currentQuestionIndex + 1} もん / ぜん ${currentPlayQuestions.length} もん`;
        document.getElementById('question-genre').textContent = currentQuiz.genre || "未設定";
        
        renderInteractiveQuestion(currentQuiz.questionText);
        
        currentHints.hint1 = currentQuiz.hint1 || "よくよんでみよう！";
        currentHints.hint2 = currentQuiz.hint2 || "もういちどチャレンジ！";
        
        let existingImgContainer = document.querySelector('.main-image-container');
        if (existingImgContainer) existingImgContainer.remove();
        
        if (currentQuiz.questionImage) {
            const mainImgContainer = document.createElement('div');
            mainImgContainer.className = 'main-image-container';
            mainImgContainer.innerHTML = `<img src="${currentQuiz.questionImage}" alt="もんだいのえ">`;
            
            const wrapper = document.querySelector('.content-wrapper');
            if (wrapper) wrapper.insertBefore(mainImgContainer, wrapper.firstChild);
        }
        
        const container = document.getElementById('quiz-container');
        container.innerHTML = '';
        
        let choices = [];
        if (Array.isArray(currentQuiz.choices)) {
            choices = [...currentQuiz.choices];
        } else if (currentQuiz.choices && typeof currentQuiz.choices === 'object') {
            choices = [
                { text: currentQuiz.choices.correct, isCorrect: true, type: 'correct' },
                { text: currentQuiz.choices.wrong, isCorrect: false, type: 'hint1' },
                { text: currentQuiz.choices.wrong2, isCorrect: false, type: 'hint2' }
            ];
        }
        
        const shuffledChoices = [...choices];
        for (let i = shuffledChoices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffledChoices[i], shuffledChoices[j]] = [shuffledChoices[j], shuffledChoices[i]];
        }
        
        shuffledChoices.forEach((choice, index) => {
            const card = document.createElement('div');
            card.className = 'image-card';
            card.onclick = function () { checkAnswer(choice, this); };
            const formattedText = choice.text.replace(/\n/g, '<br>');
            card.innerHTML = `
                <div class="card-text">${formattedText}</div>
                <div class="label">せんたくし ${index + 1}</div>
            `;
            container.appendChild(card);
        });
    }

    // 🚀 大改善：音声・アバター処理を維持したまま、ボタン内包＆閉じる機能を追加
    function checkAnswer(choice, cardElement) {
        if (cardElement.classList.contains('correct-anim') || cardElement.classList.contains('wrong-anim')) {
            return;
        }
        const resultBox = document.getElementById('result-box');
        const radikaAvatar = document.getElementById('radika-avatar'); 
        const retryButton = document.getElementById('retry-button');
        const nextButton = document.getElementById('next-button');

        // 最初にボタンとヒント文の表示状況を一度リセット
        if (retryButton) retryButton.style.display = 'none';
        if (nextButton) nextButton.style.display = 'none';
        
        let existingHint = resultBox.querySelector('.dynamic-hint-text');
        if (existingHint) existingHint.remove();

        if (choice.isCorrect) {
            // 【正解のときの処理】
            cardElement.classList.add('correct-anim');
        
            // ----------------------------------------------------
            // ★ 得点機能の計算処理 (❹ 得点ルール)
            // ----------------------------------------------------
            let pointsEarned = 0;
        
            if (currentQuestionAttempts === 0) {
                // 1度で正解：3ポイント
                pointsEarned = 3;
            } else if (currentQuestionAttempts === 1) {
                // 1度不正解の後に正解：1ポイント（ただし1日3回まで）
                let todayRetryCount = parseInt(localStorage.getItem('dockais_retry_bonus_today') || '0');
                if (todayRetryCount < 3) {
                    pointsEarned = 1;
                    localStorage.setItem('dockais_retry_bonus_today', String(todayRetryCount + 1));
                } else {
                    pointsEarned = 0; // 4回目以降は0ポイント
                }
            } else {
                // 2度以上不正解の後に正解：0ポイント
                pointsEarned = 0;
            }

            // データの加算と保存
            let currentTotalScore = parseInt(localStorage.getItem('dockais_total_score') || '0');
            let currentCorrectCount = parseInt(localStorage.getItem('dockais_correct_count') || '0');
        
            localStorage.setItem('dockais_total_score', String(currentTotalScore + pointsEarned));
            localStorage.setItem('dockais_correct_count', String(currentCorrectCount + 1));
        
            // メーターと数字を画面に即時反映
            updateAndCheckScoreBoard();

            // 🔊 音声を再生
            correctSound.currentTime = 0;
            correctSound.play();

            // 💡 安全な中身の差し替え
            resultBox.className = 'result-message result-correct';
            
            const textContentEl = document.getElementById('result-content');
            if (textContentEl) {
                textContentEl.innerHTML = `<div class="result-text" style="color: #4caf50 !important; font-size: 26px; font-weight: bold; margin-bottom: 10px;">🎉 せいかい！よくよめたね！</div>`;
            }
            
            if (radikaAvatar) {
                radikaAvatar.src = 'radika_correct.png';
                radikaAvatar.className = 'radika-happy';
                radikaAvatar.style.display = 'block';
            }
            
            if (nextButton) nextButton.style.display = 'block';
            
        } else {
            // 【不正解のときの処理】
            cardElement.classList.add('wrong-anim');
            currentQuestionAttempts++; // ★ミスカウントを増やす

            // 🔊 音声を再生
            wrongSound.currentTime = 0;
            wrongSound.play();

            resultBox.className = 'result-message result-wrong';
        
            // 選択肢のタイプに合わせて、記録していたヒントを取得
            const targetHint = choice.type === 'hint1' ? currentHints.hint1 : currentHints.hint2;
            
            // 💡 安全な中身の差し替え
            const textContentEl = document.getElementById('result-content');
            if (textContentEl) {
                textContentEl.innerHTML = `
                    <div class="result-text" style="color: #f44336 !important; font-size: 24px; font-weight: bold; margin-bottom: 10px;">❌ ざんねん！もういちどよくよんでみよう！</div>
                    <p class="dynamic-hint-text" style="font-size: 16px; font-weight: bold; color: #555; margin: 6px 0; padding: 0 15px; line-height: 1.4;">${targetHint}</p>
                `;
            }
            
            if (radikaAvatar) {
                radikaAvatar.src = 'radika_wrong.png';
                radikaAvatar.className = 'radika-shock';
                radikaAvatar.style.display = 'block';
            }

            if (retryButton) retryButton.style.display = 'block';

            // 震えるアニメーションの自動解除
            setTimeout(() => {
                cardElement.classList.remove('wrong-anim');
            }, 400);
        }

        // 画面中央のポップアップとして表示
        resultBox.style.display = 'flex';
    }

      const container = document.getElementById('quiz-container');
      container.classList.remove('slide-in');
      void container.offsetWidth; 
      container.classList.add('slide-in');
    }

        // 💡 先生が貼り付けたJSONデータをブラウザに保存する関数
    function addCustomQuestion() {
      const inputTextArea = document.getElementById('admin-json-input');
      const jsonText = inputTextArea.value.trim();
      
      if (!jsonText) {
        alert('JSONデータが入力されていません！');
        return;
      }
      
      try {
        // 貼り付けられたテキストが正しいJSON形式かチェック
        const newQuestion = JSON.parse(jsonText);
        
        // 最低限必要な情報（idや問題文）が入っているか確認
        if (!newQuestion.id || !newQuestion.questionText) {
          alert('問題データの形式が正しくないようです。「id」や「questionText」が含まれているか確認してください。');
          return;
        }
        
        // すでに保存されている追加分のリストを取得
        const localQuestionsData = localStorage.getItem('dockais_added_questions');
        let localQuestions = localQuestionsData ? JSON.parse(localQuestionsData) : [];
        
        // 同じIDの問題がすでに登録されていないか重複チェック
        const isDuplicate = localQuestions.some(q => q.id === newQuestion.id);
        if (isDuplicate) {
          if (!confirm(`すでに問題ID「${newQuestion.id}」は追加されています。上書きしますか？`)) {
            return;
          }
          // 重複している古い問題を一度削除
          localQuestions = localQuestions.filter(q => q.id !== newQuestion.id);
        }
        
        // 新しい問題をリストに加えて保存
        localQuestions.push(newQuestion);
        localStorage.setItem('dockais_added_questions', JSON.stringify(localQuestions));
        
        alert(`🎉 問題ID「q${newQuestion.id}」をアプリに追加しました！\nフォルダ「q${newQuestion.id}」の中にイラスト画像が入っていることを確認してください。`);
        
        // フォームを空にして画面を再起動し、新しい問題を出題対象に含める
        inputTextArea.value = '';
        initApp();
        
      } catch (error) {
        console.error(error);
        alert('❌ エラー：JSONの形式が正しくありません。ChatGPTが出力したコードブロックをそっくりそのままコピーできているか確認してください。');
      }
    }

    // 💡 追加した問題をすべてリセットして最初の11問に戻す関数
    function resetCustomQuestions() {
      if (confirm('これまで追加した問題をすべて削除し、最初の11問だけの状態に戻しますか？')) {
        localStorage.removeItem('dockais_added_questions');
        alert('追加した問題をリセットしました。');
        initApp();
      }
    }

    // 💡 追記：管理画面のパスワードチェック関数
    function checkAdminPassword() {
      // 🌟 ここに好きなパスワードを設定してください（現在は 'radika-admin' になっています）
      const CORRECT_PASSWORD = 'radika-admin'; 
      
      const inputPassword = document.getElementById('admin-password').value;
      const adminMainForm = document.getElementById('admin-main-form');
      const authBox = document.getElementById('admin-auth-box');

      if (inputPassword === CORRECT_PASSWORD) {
        alert('🔓 パスワードが合っていました！管理画面を開きます。');
        adminMainForm.style.display = 'block'; // 本体のフォームを表示
        authBox.style.display = 'none';         // パスワード入力欄を隠す
      } else {
        alert('❌ パスワードが違います。もう一度入力してください。');
        document.getElementById('admin-password').value = ''; // 入力欄をクリア
      }
    }

        // 💡 追記：追加した問題をJSONファイルとしてパソコンに保存（ダウンロード）する関数
    function exportQuestionsToFile() {
      // LocalStorageから追加問題データを取得
      const localQuestionsData = localStorage.getItem('dockais_added_questions');
      
      if (!localQuestionsData || JSON.parse(localQuestionsData).length === 0) {
        alert('まだ新しく追加された問題がありません。データを保存するには問題を1問以上追加してください。');
        return;
      }

      // JSONデータを綺麗に整形してテキスト化
      const jsonText = JSON.stringify(JSON.parse(localQuestionsData), null, 2);
      
      // ブラウザにダウンロードさせるための仕組み（Blobオブジェクト）を作成
      const blob = new Blob([jsonText], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      
      // 一時的なリンクを作って自動的にクリック（ダウンロード実行）
      const a = document.createElement('a');
      a.href = url;
      a.download = 'dockais_backup_questions.json'; // ダウンロードされるファイル名
      document.body.appendChild(a);
      a.click();
      
      // 後片付け
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // 💡 追記：パソコンに保存したJSONファイルを読み込んでLocalStorageを復元する関数
    function importQuestionsFromFile(inputElement) {
      const file = inputElement.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const importedData = JSON.parse(e.target.result);
          
          // 読み込んだデータが正しい配列の形式かチェック
          if (!Array.isArray(importedData)) {
            alert('❌ エラー：ファイルのデータ形式が正しくありません。');
            return;
          }

          if (!confirm(`保存ファイルから ${importedData.length} 問の問題を復元しますか？\n（※現在アプリに追加されているカスタム問題は上書きされます）`)) {
            inputElement.value = ''; // ファイル選択をクリア
            return;
          }

          // LocalStorageに保存してアプリを再起動
          localStorage.setItem('dockais_added_questions', JSON.stringify(importedData));
          alert('🎉 バックアップから問題を無事に復元しました！');
          
          inputElement.value = ''; // ファイル選択をクリア
          initApp(); // スタート画面に戻して再読み込み
          
        } catch (error) {
          console.error(error);
          alert('❌ エラー：ファイルの読み込みに失敗しました。正しいJSONファイルか確認してください。');
          inputElement.value = '';
        }
      };
      
      reader.readAsText(file);
    }



    // ========================================================
    // 得点機能用：新しく追加したグローバル変数
    // ========================================================
    let currentQuestionAttempts = 0; // 現在の問題の回答ミス回数

    /**
     * 🎯 スコアボードの更新 ＆ 自動リセット誤作動防止版
     */
    function updateAndCheckScoreBoard() {
        const now = new Date();
        const currentMonth = now.getMonth() + 1;
        const currentDate = now.getDate();
        const dateStr = `${currentMonth}がつ${currentDate}にち`;
        
        // 🛠️ 解決①：画面内にあるすべての「id="score-date"」を一括で本日の日付に変えます
        document.querySelectorAll('#score-date').forEach(el => {
            el.innerText = dateStr;
        });

        const todayKey = `${now.getFullYear()}-${currentMonth}-${currentDate}`;
        const savedDateKey = localStorage.getItem('dockais_score_date_key');
        
        // 誤作動防止安全装置
        if (!savedDateKey) {
            localStorage.setItem('dockais_score_date_key', todayKey);
        } else if (savedDateKey !== todayKey) {
            localStorage.setItem('dockais_score_date_key', todayKey);
            localStorage.setItem('dockais_total_score', '0');
            localStorage.setItem('dockais_correct_count', '0');
            localStorage.setItem('dockais_retry_bonus_today', '0');
        }

        let totalScore = parseInt(localStorage.getItem('dockais_total_score') || '0');
        let correctCount = parseInt(localStorage.getItem('dockais_correct_count') || '0');

        if (correctCount > 99) correctCount = 99;

        let gaugePercentage = (totalScore / 10) * 100;
        if (gaugePercentage > 100) gaugePercentage = 100;

        // 🛠️ 解決②：画面内にあるすべての「id="score-gauge-bar"」を一括で伸ばし、3色カラーを連動させます
        document.querySelectorAll('#score-gauge-bar').forEach(bar => {
            bar.style.width = `${gaugePercentage}%`;
            bar.innerText = ""; // 古い中身の文字を消去
            bar.classList.remove('gauge-medium', 'gauge-max');
            if (totalScore >= 10) bar.classList.add('gauge-max');
            else if (totalScore >= 4) bar.classList.add('gauge-medium');
        });

        // 🛠️ 解決③：画面内にあるすべての「id="score-gauge-text"」の一括書き換え（0/10表示）
        document.querySelectorAll('#score-gauge-text').forEach(textEl => {
            textEl.innerText = `${totalScore} / 10`;
        });

        // 🛠️ 解決④：画面内にあるすべての「id="score-count"」の一括書き換え（せいかい数バッジ）
        document.querySelectorAll('#score-count').forEach(countEl => {
            countEl.innerHTML = `せいかい: <span style="font-weight: 900; color: #2e7d32;">${correctCount}もん</span>`;
            countEl.style.setProperty('min-width', '0px', 'important');
            countEl.style.setProperty('width', 'auto', 'important');
            
            // スタート画面側と問題画面側で、それぞれのパディング（余白）を美しく自動フィット
            if (countEl.closest('#start-screen')) {
                countEl.style.setProperty('padding', '4px 8px', 'important');
            } else {
                countEl.style.setProperty('padding', '5px 6px', 'important');
            }
        });
    }
    
    /**
     * 🛠️ テスト用：スコアデータを強制リセットしてメーターを0に戻す関数
     */
    function resetScoreForTest() {
        if (confirm("今日のスコアとメーターを完全に0リセットしてもよろしいですか？")) {
            localStorage.setItem('dockais_total_score', '0');
            localStorage.setItem('dockais_correct_count', '0');
            localStorage.setItem('dockais_retry_bonus_today', '0');
            
            // 画面のメーター表示を即座に0点（空っぽ）に更新
            updateAndCheckScoreBoard();
            alert("リセットしました！");
        }
    }
    
    window.onload = initApp;
  </script>
